name: 402_ATD_U_jpegcar_gray_q20
model_type: ATDUNetModel
scale: 1
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 0

datasets:
  test_1: 
    name: Classic5
    type: Dataset_JPEGCAR
    quality_factor: 20
    in_ch: 1
    dataroot_gt: datasets/CAR/classic5/Classic5_HQ
    dataroot_lq: none
    io_backend:
      type: disk

  test_2: 
    name: Live1
    type: Dataset_JPEGCAR
    quality_factor: 20
    in_ch: 1
    dataroot_gt: datasets/CAR/LIVE1/LIVE1_HQ
    dataroot_lq: none
    io_backend:
      type: disk

  test_3:
    name: Urban100
    type: Dataset_JPEGCAR
    quality_factor: 20
    in_ch: 1
    dataroot_gt: datasets/ColorDN/Urban100HQ  # y channel of RGB image
    dataroot_lq: none
    io_backend:
      type: disk

# network structures
network_g:
  type: ATDUNet
  upscale: 1
  in_chans: 1
  embed_dim: 48
  depths: [6, 8, 8, 6]
  num_heads: [1, 2, 4, 8]
  window_size: [16, 8, 8, 8]
  dim_ffn_td: [6, 12, 12, 12]
  category_size: [128, 128, 128, 128]
  num_tokens: [128, 128, 128, 128]
  reducted_dim: [6, 12, 24, 24]
  convffn_kernel_size: 5
  bias: false
  img_range: 1.
  mlp_ratio: 2.66
  use_checkpoint: true

# path
path:
  pretrain_network_g: experiments/pretrained_models/402_ATD_U_jpegcar_gray_q20.pth
  strict_load_g: yes
  param_key_g: params_ema

# validation settings
val:
  save_img: true
  suffix: ~  # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: yes
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false
