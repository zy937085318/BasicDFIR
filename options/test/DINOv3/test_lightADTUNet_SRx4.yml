# Test lightADTUNet SR x4 — iter 5000 checkpoint (EMA)
# SRUNetModel: feed_data bicubic-upscales LQ to GT size, network refines at full res

name: test_lightADTUNet_SRx4
model_type: SRUNetModel
scale: 4
num_gpu: 1
manual_seed: 0

# dataset settings
datasets:
  test_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_4/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_4/LR
    filename_tmpl: '{}'
    io_backend:
      type: disk

  test_2:
    name: Set14
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Set14/image_SRF_4/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Set14/image_SRF_4/LR
    filename_tmpl: '{}'
    io_backend:
      type: disk

# network structures (must match training config)
network_g:
  type: ATDUNet
  upscale: 1
  in_chans: 3
  embed_dim: 48
  depths: [1, 1, 6, 6]
  num_heads: [1, 1, 4, 4]
  window_size: [8, 8, 8, 8]
  dim_ffn_td: [6, 12, 12, 12]
  category_size: [128, 128, 128, 128]
  num_tokens: [128, 128, 128, 128]
  reducted_dim: [6, 12, 24, 24]
  convffn_kernel_size: 5
  bias: false
  img_range: 1.
  mlp_ratio: 2.66
  use_checkpoint: false

# path
path:
  pretrain_network_g: /8T2/Project/BasicDFIR/experiments/lightADTUNetModel_SRx4_scratch_20260414_131917_570201/models/net_g_5000.pth
  strict_load_g: true
  param_key_g: params_ema

# validation settings
val:
  save_img: false
  suffix: ~

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
    lpips:
      type: calculate_lpips
      crop_border: 4
      test_y_channel: false
      model: 'alex'
