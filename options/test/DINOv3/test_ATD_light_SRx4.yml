# Test ATD (light) SR x4 — 5 benchmarks × 5 metrics
# Model: 103lightATD_SRx4_B8P64_scratch, checkpoint net_g_460000 (EMA)
# Note: ATD_test2 has been modified (conv_first in=48), checkpoint uses original ATD (in=3)

name: test_ATD_light_SRx4
model_type: ATDModel
scale: 4
num_gpu: 1
manual_seed: 0

# dataset settings
datasets:
  test_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_4/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_4/LR
    filename_tmpl: '{}'
    io_backend:
      type: disk

  test_2:
    name: Set14
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Set14/image_SRF_4/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Set14/image_SRF_4/LR
    filename_tmpl: '{}'
    io_backend:
      type: disk

  test_3:
    name: BSDS100
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/BSDS100/image_SRF_4/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/BSDS100/image_SRF_4/LR
    filename_tmpl: '{}'
    io_backend:
      type: disk

  test_4:
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Urban100/image_SRF_4/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Urban100/image_SRF_4/LR
    filename_tmpl: '{}'
    io_backend:
      type: disk

  test_5:
    name: Manga109
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Manga109/image_SRF_4/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Manga109/image_SRF_4/LR
    filename_tmpl: '{}'
    io_backend:
      type: disk

# network structures (must match training config)
network_g:
  type: ATD
  upscale: 4
  in_chans: 3
  img_size: 64
  embed_dim: 48
  depths: [6, 6, 6, 6]
  num_heads: [3, 3, 3, 3]
  window_size: 16
  dim_ffn_td: 4
  category_size: 128
  num_tokens: 128
  reducted_dim: 12
  convffn_kernel_size: 7
  img_range: 1.
  mlp_ratio: 1
  upsampler: 'pixelshuffledirect'
  resi_connection: '1conv'
  use_checkpoint: false

# path
path:
  pretrain_network_g: /8T2/Project/BasicDFIR/experiments/103lightATD_SRx4_B8P64_scratch_20260410_213657_597156_finished_32.54_28.90/models/net_g_460000.pth
  strict_load_g: true
  param_key_g: params_ema

# validation settings
val:
  save_img: false
  suffix: ~

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
    niqe:
      type: calculate_niqe
      crop_border: 4
      convert_to: 'y'
    fid:
      type: calculate_fid
      crop_border: 4
    lpips:
      type: calculate_lpips
      crop_border: 4
      test_y_channel: false
      model: 'alex'
