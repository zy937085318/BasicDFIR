name: train_JiT_v2_1_swinflowir_B8_SRx2_P64_scratch
model_type: JiTv2_1Model
num_sampling_steps: 5
scale: 2
num_gpu: 1
manual_seed: 0

datasets:
  val_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_2/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_2/LR
    filename_tmpl: '{}'
    io_backend:
      type: disk
#  test_2:  # the 2nd test dataset
#    name: Set14
#    type: PairedImageDataset
#    dataroot_gt: datasets/Set14/GTmod12
#    dataroot_lq: datasets/Set14/LRbicx2
#    io_backend:
#      type: disk
#
#  test_3:
#    name: DIV2K100
#    type: PairedImageDataset
#    dataroot_gt: datasets/DIV2K/DIV2K_valid_HR
#    dataroot_lq: datasets/DIV2K/DIV2K_valid_LR_bicubic/X2
#    filename_tmpl: '{}x2'
#    io_backend:
#      type: disk

# network structures
network_g:
  type: SwinFlowIRv2
  upscale: 2
  in_chans: 3
  out_chans: 3
  img_size: 32
  window_size: 8
  img_range: 1.
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 180
  num_heads: [6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'

# path
path:
  pretrain_network_g: experiments/train_JiT_v2_swinflowir_B8_SRx2_P64_scratch_20260202_151917_085010/models/net_g_5000.pth
  strict_load_g: true
  param_key_g: params_ema

# validation settings
val:
  save_img: true
  suffix: ~  # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 2
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 2
      test_y_channel: true
    lpips:
      type: calculate_lpips
      model: 'alex'
