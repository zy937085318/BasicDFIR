# general settings
#swinflowir上采样倍率为1，测试噪声为输入，LR图像为reference,噪声和LR cat在一起。
name: test_flowmatching_unet_B8_SRx2_P64_scratch
model_type: FlowMatchingModel
sample_step: 10
scale: 4
num_gpu: 1
manual_seed: 0

# dataset and data loader settings
datasets:
  test_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_4/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_4/LR
    filename_tmpl: '{}'
    io_backend:
      type: disk
  test_2:
    name: Set14
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Set14/image_SRF_2/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Set14/image_SRF_2/LR
    filename_tmpl: '{}'
    io_backend:
      type: disk
