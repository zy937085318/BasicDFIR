# network structures
network_g:
  type: PnPFlowUNet
  input_channels: 6
  img_size: 256
  ch: 32
  output_channels: 3
  ch_mult: [1, 2, 4, 8]
  num_res_blocks: 6
  attn_resolutions: [16, 8]
  check_point: ~ #/8T2/Project/BasicDFIR/checkpoint/pnpunet_256_afhq_cat.pt

# path
path:
  pretrain_network_g: ./experiments/train_flowmatching_unet_B8_SRx2_P64_scratch_20260308_111959_124378/models/net_g_10000.pth #~
  strict_load_g: true
  resume_state: ~



# validation settings
val:
  save_img: true
  suffix: ~

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 2
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 2
      test_y_channel: true
    lpips:
      type: calculate_lpips
      model: 'alex'
