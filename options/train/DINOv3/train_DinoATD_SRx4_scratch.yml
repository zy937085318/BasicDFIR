
# general settings
name: train_DinoATD_SRx4_scratch
model_type: SRUNetModel
scale: 4
num_gpu: 1
manual_seed: 0
# find_unused_parameters: True

# dataset and data loader settings
datasets:
  train:
    name: DF2K
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/DF2K/train_HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/DF2K/train_LR_bicubic/X4
    filename_tmpl: '{}'
    io_backend:
      type: disk

    gt_size: 256
    use_hflip: true
    use_rot: true

    # data loader
    num_worker_per_gpu: 6
    batch_size_per_gpu: 8
    dataset_enlarge_ratio: 1
    prefetch_mode: cuda
    pin_memory: True
    persistent_workers: True

  val_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_4/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_4/LR
    io_backend:
      type: disk

  val_2:
    name: Set14
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Set14/image_SRF_4/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Set14/image_SRF_4/LR
    io_backend:
      type: disk

# network structures
network_g:
  type: DinoATD
  # DINOv3 encoder settings
  dino_size: tiny  # DINOv3 model size: tiny, small, base, large
  scale_factor: [2, 2, 1, 1]  # Downsampling ratios for each stage
  freeze: true  # Freeze DINO backbone (except downsample layers)

  # ATD settings
  upscale: 4
  in_chans: 3
  img_size: 256
  embed_dim: 48  # Embedding dimension (mapped from DINO dimensions)
  depths: [6, 6, 6, 6]  # Number of blocks in each stage
  num_heads: [3, 3, 3, 3]  # Number of attention heads (must divide embed_dim)
  window_size: 16  # Window size for SW-MSA
  dim_ffn_td: 4  # Dimension of FFN in Token Dictionary
  category_size: 128  # Category size for AC-MSA
  num_tokens: 128  # Number of tokens in Token Dictionary
  reducted_dim: 12  # Reduced dimension for ATD-CA
  convffn_kernel_size: 7  # Kernel size for ConvFFN
  mlp_ratio: 1.  # MLP expansion ratio
  img_range: 1.  # Image range for normalization
  upsampler: 'pixelshuffle'  # Upsampler type: pixelshuffle, pixelshuffledirect, nearest+conv
  resi_connection: '1conv'  # Residual connection type: 1conv, 3conv
  use_checkpoint: false  # Use gradient checkpointing to save memory

# path
path:
  pretrain_network_g: ~  # Path to pre-trained model (if any)
  strict_load_g: false
  resume_state: ~

# training settings
train:
  use_fp16: true
  ema_decay: 0.999
  optim_g:
    type: AdamW
    lr: !!float 2e-5
    weight_decay: 0
    betas: [0.9, 0.9]

  scheduler:
    type: MultiStepLR
    milestones: [250000, 400000, 450000, 475000]
    gamma: 0.5

  total_iter: 500000
  warmup_iter: 5000

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3
  save_img: false

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: yes

    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: yes

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
