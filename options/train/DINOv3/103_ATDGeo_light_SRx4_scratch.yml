
# ==============================================================================
# ATDGeo (ATD + Geodesic Domain-Transform Window Attention) — Light SR x4
# ==============================================================================
# 基于 103_ATD_light_SRx4_finetune.yml，将 network_g.type 改为 ATDGeo
# 新增参数: geo_sigma_ratio (测地距离边缘灵敏度初始值)
#
# 核心修改:
#   WindowAttention → WindowAttentionGeo
#   在 SW-MSA 的 attention logits 上叠加测地距离 bias:
#     attn = softmax(QK/√d + rel_pos_bias - geo_scale · d_geo) · V
#
# 新增可学习参数 (仅 20 个):
#   geo_sigma × num_layers  = 4    (每层边缘灵敏度)
#   geo_scale × num_layers × num_heads = 4×3 = 12  (每头测地距离缩放)
# ==============================================================================

# general settings
name: 103_ATDGeo_light_SRx4_B8P64_scratch
model_type: SRModel
scale: 4
num_gpu: 1
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: DF2K
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/DF2K/train_HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/DF2K/train_LR_bicubic/X4
    filename_tmpl: '{}'
    io_backend:
      type: disk

    gt_size: 256
    use_hflip: true
    use_rot: true

    # data loader
    num_worker_per_gpu: 6
    batch_size_per_gpu: 8
    dataset_enlarge_ratio: 1
    prefetch_mode: cuda
    pin_memory: True
    persistent_workers: True

  val_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_4/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_4/LR
    io_backend:
      type: disk

  val_2:
    name: Set14
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Set14/image_SRF_4/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Set14/image_SRF_4/LR
    io_backend:
      type: disk

# network structures
network_g:
  type: ATDGeo                        # ← 原为 ATD_test2，改为 ATDGeo
  upscale: 4
  in_chans: 3
  img_size: 64
  embed_dim: 48
  depths: [6, 6, 6, 6]
  num_heads: [3, 3, 3, 3]
  window_size: 16
  dim_ffn_td: 4
  category_size: 128
  num_tokens: 128
  reducted_dim: 12
  convffn_kernel_size: 7
  img_range: 1.
  mlp_ratio: 1
  upsampler: 'pixelshuffledirect'
  resi_connection: '1conv'
  use_checkpoint: false
  geo_sigma_ratio: 1.0               # ★ 新增: 测地距离边缘灵敏度初始值

# path
path:
  pretrain_network_g: ~
  strict_load_g: false
  resume_state: ~

# training settings
train:
  use_fp16: true
  ema_decay: 0.999
  optim_g:
    type: AdamW
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.9]

  scheduler:
    type: MultiStepLR
    milestones: [250000, 400000, 450000, 475000]
    gamma: 0.5

  total_iter: 500000
  warmup_iter: -1

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3
  save_img: false

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: yes

    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: yes

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
