
# general settings
name: lightADTUNetModel_SRx4_scratch
model_type: SRUNetModel
scale: 4
num_gpu: 1
manual_seed: 0
# find_unused_parameters: True

# dataset and data loader settings
datasets:
  train:
    name: DF2K
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/DF2K/train_HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/DF2K/train_LR_bicubic/X4
    filename_tmpl: '{}'
    io_backend:
      type: disk

    gt_size: 256
    use_hflip: true
    use_rot: true

    # data loader
    num_worker_per_gpu: 8
    batch_size_per_gpu: 8
    dataset_enlarge_ratio: 1
    prefetch_mode: cuda
    pin_memory: True
    persistent_workers: True

  val_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_4/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_4/LR
    io_backend:
      type: disk

  val_2:
    name: Set14
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Set14/image_SRF_4/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Set14/image_SRF_4/LR
    io_backend:
      type: disk

# network structures
network_g:
  type: ATDUNet
  upscale: 1
  in_chans: 3
  embed_dim: 48
  depths: [ 1, 1, 6, 6 ]
  num_heads: [ 1, 1, 4, 4 ]
  window_size: [ 8, 8, 8, 8 ]
  dim_ffn_td: [ 6, 12, 12, 12 ]
  category_size: [ 128, 128, 128, 128 ]
  num_tokens: [ 128, 128, 128, 128 ]
  reducted_dim: [ 6, 12, 24, 24 ]
  convffn_kernel_size: 5
  bias: false
  img_range: 1.
  mlp_ratio: 2.66
  use_checkpoint: false

# path
path:
  pretrain_network_g: ~ #experiments/000_ATD_SRx2_scratch/models/net_g_latest.pth
  strict_load_g: false
  resume_state: ~

# training settings
train:
  use_fp16: true
  ema_decay: 0.999
  optim_g:
    type: AdamW
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.9]

  scheduler:
    type: MultiStepLR
    milestones: [ 250000, 400000, 450000, 475000 ]
    gamma: 0.5

  total_iter: 500000
  warmup_iter: -1

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3
  save_img: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: yes
    
    ssim: # metric name, can be arbitrary
      type: calculate_ssim
      crop_border: 4
      test_y_channel: yes
    lpips:
      type: calculate_lpips
      model: 'alex'

# logging settings
logger:
  print_freq: 10
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
