# general settings
#swinflowir上采样倍率为1，测试噪声为输入，LR图像为reference,噪声和LR cat在一起。
name: train_PFM_swinmfir_B8_SRx2_P64_scratch
model_type: PixelMeanFlow_Model
sampling_dist: uniform #logit_normal
num_sampling_steps: 1
scale: 2
num_gpu: 1
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    task: SR
    name: DF2K
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/DF2K/train_HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/DF2K/train_LR_bicubic/X2
    filename_tmpl: '{}x2'
    io_backend:
      type: disk

    gt_size: 64
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 8
    dataset_enlarge_ratio: 100
    prefetch_mode: ~
  val_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_2/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_2/LR
    filename_tmpl: '{}'
    io_backend:
      type: disk
