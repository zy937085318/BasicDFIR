# ============================================================
# ABCFlowv2 Training Config
# ABC Flow enhanced JiT (Flow Matching) for SR x4
#
# Key changes from v1 (ABCFlow):
#   - Uses ABCUNetv2: ABC flow as feature modulation (not output)
#   - Uses ABCFlowv2Model: velocity loss + gradient regularization
#   - sample_step: 20 (vs 5)
#   - start_noise_scale: 0.3 (start from lq_bicubic + noise, not randn)
#   - abc_grad_reg_weight: 0.05 (replaces unphysical Beltrami loss)
# ============================================================

# general settings
name: train_ABCFlowv2_B8_SRx4_P64
model_type: ABCFlowv2Model
scale: 4
num_gpu: 1
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    task: SR
    name: DF2K
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/DF2K/train_HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/DF2K/train_LR_bicubic/X4
    filename_tmpl: '{}x4'
    io_backend:
      type: disk

    gt_size: 256
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 8
    dataset_enlarge_ratio: 100
    prefetch_mode: ~

  val_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_4/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_4/LR
    filename_tmpl: '{}'
    io_backend:
      type: disk

# network structures
network_g:
  type: ABCUNetv2
  input_channels: 6          # [x_t, lq_bicubic] concatenated
  img_size: 256
  ch: 32                     # base channel width
  output_channels: 3         # predict x_1 (target image), 3 channels
  ch_mult: [1, 2, 4, 8]      # channel multipliers for each resolution
  num_res_blocks: 6          # residual blocks per resolution
  attn_resolutions: [16, 8]   # apply self-attention at these resolutions
  dropout: 0.0
  resamp_with_conv: true
  # act and normalize use defaults (Swish, group_norm) - no need to specify
  meanflow: false

  # ABC flow specific
  enable_abc_flow: true       # enable ABC flow feature modulation
  abc_hidden_channels: 32    # hidden channels for ABC parameter prediction
  abc_modulation_strength: 0.1  # strength of ABC flow modulation

  check_point: ~              # pretrained checkpoint path (optional)

# path
path:
  pretrain_network_g: ~      # pretrained network path (optional)
  strict_load_g: true
  resume_state: ~

# training settings
train:
  ema_decay: 0.999

  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [250000, 400000, 450000, 475000]
    gamma: 0.5

  total_iter: 500000
  warmup_iter: 1000

  # ============================================================
  # ABC Flow v2 specific settings
  # ============================================================
  # Starting noise scale for inference.
  # 0.0 = start from pure lq_bicubic (deterministic)
  # 0.3 = start from lq_bicubic + 0.3 * noise (recommended)
  # Higher values increase stochasticity (closer to original JiT)
  abc_start_noise_scale: 0.3

  # Gradient regularization weight.
  # Encourages output to preserve image gradients (edges, textures).
  # Replaces v1's unphysical Beltrami loss.
  # 0.0 = no gradient regularization
  # 0.05 = recommended starting value
  abc_grad_reg_weight: 0.05

  # losses
  # pixel_opt is not used in v2 (velocity loss is primary)
  # but kept for compatibility with the training framework
  pixel_opt:
    type: L1Loss
    loss_weight: 0.5
    reduction: mean

#  # perceptual loss (optional, recommended for better visual quality)
#  perceptual_opt:
#    type: PerceptualLoss
#    layer_weights:
#      'relu1_2': 1.0
#      'relu2_2': 1.0
#      'relu3_4': 1.0
#    vgg_type: vgg19
#    use_input_norm: true
#    range_norm: false
#    perceptual_weight: 1.0
#    style_weight: 0.
#    criterion: l1

# validation settings
val:
  val_freq: !!float 5e3
  save_img: true
  pbar: true

  # ============================================================
  # Sampling settings (key fix from v1)
  # ============================================================
  # Number of ODE integration steps.
  # v1 used 5 steps -> noisy results due to poor integration.
  # v2 uses 20 steps -> much better accuracy.
  # Even higher values (50) can further improve quality at cost of speed.
  sample_step: 20

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 2
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 2
      test_y_channel: true
    lpips:
      type: calculate_lpips
      model: 'alex'

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
