# ============================================================
# ABCFlowv3 Training Config
# Helmholtz-Beltrami Flow + JiT Flow Matching for SR x4
#
# Key Design:
#   Velocity = v_curl_free + v_solenoidal
#           = ∇φ (from LR) + ∇×ψ (from depth)
#
#   Helmholtz Losses:
#     L_div = ||∇·v||²      (penalize non-div-free)
#     L_curl = ||∇×v||²     (penalize non-curl-free)
#     L_beltrami = ||∇×v - λ·v||²  (soft Beltrami constraint)
# ============================================================

name: train_ABCFlowv3_B8_SRx4_P64
model_type: ABCFlowv3Model
scale: 4
num_gpu: 1
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    task: SR
    name: DF2K
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/DF2K/train_HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/DF2K/train_LR_bicubic/X4
    filename_tmpl: '{}x4'
    io_backend:
      type: disk

    gt_size: 256
    use_hflip: true
    use_rot: true

    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 8
    dataset_enlarge_ratio: 100
    prefetch_mode: ~

  val_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_4/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_4/LR
    filename_tmpl: '{}'
    io_backend:
      type: disk

# network structures
network_g:
  type: HelmholtzUNetv3
  input_channels: 6          # [x_t, lq_bicubic] concatenated
  img_size: 256
  ch: 32                     # base channel width
  output_channels: 3        # predict x_1 (3 channels)
  ch_mult: [1, 2, 4, 8]     # channel multipliers
  num_res_blocks: 6         # residual blocks per resolution
  attn_resolutions: [16, 8]
  dropout: 0.0
  resamp_with_conv: true
  meanflow: false

  # Helmholtz decomposition specific
  enable_helmholtz: true      # enable Helmholtz velocity decomposition
  helmholtz_hidden_channels: 64  # hidden channels for φ/ψ branches
  helmholtz_alpha_init: 0.3     # initial balance between curl-free/solenoidal

  # Depth branch
  enable_depth_branch: true     # enable lightweight depth estimator

  check_point: ~

# path
path:
  pretrain_network_g: ~      # pretrained network path (optional)
  strict_load_g: true
  resume_state: ~

# training settings
train:
  ema_decay: 0.999

  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [250000, 400000, 450000, 475000]
    gamma: 0.5

  total_iter: 500000
  warmup_iter: 1000

  # ============================================================
  # Helmholtz Flow specific settings
  # ============================================================

  # Velocity loss (primary, recommended: 1.0)
  velocity_weight: 1.0

  # Helmholtz regularization weights
  # These encourage the velocity field to be physically consistent
  helmholtz_div_weight: 0.05     # ||∇·v||² weight (div-free regularization)
  helmholtz_curl_weight: 0.05   # ||∇×v||² weight (curl-free regularization)
  helmholtz_beltrami_weight: 0.01  # ||∇×v - λ·v||² weight (soft Beltrami)

  # Beltrami parameter λ (controls vortex strength scaling)
  helmholtz_lambda: 0.1

  # Depth loss weight (0 = no depth supervision, 0.01 = TV on depth)
  # For datasets without GT depth, use TV regularization
  depth_weight: 0.01

  # Inference: starting noise scale
  # 0.0 = deterministic (from lq_bicubic)
  # 0.3 = stochastic (from lq_bicubic + 0.3*noise)
  abc_start_noise_scale: 0.3

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 0.5
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3
  save_img: true
  pbar: true

  # Number of ODE integration steps (20 recommended, higher = better quality)
  sample_step: 20

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 2
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 2
      test_y_channel: true
    lpips:
      type: calculate_lpips
      model: 'alex'

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
