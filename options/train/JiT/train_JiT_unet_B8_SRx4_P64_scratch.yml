# network structures
network_g:
  type: PnPFlowUNet
  input_channels: 6
  img_size: 256
  ch: 32
  output_channels: 3
  ch_mult: [1, 2, 4, 8]
  num_res_blocks: 6
  attn_resolutions: [16, 8]
  check_point: ~ #/8T2/Project/BasicDFIR/checkpoint/pnpunet_256_afhq_cat.pt

# path
path:
  pretrain_network_g: ~ #/8T2/Project/BasicDFIR/experiments/train_flowmatching_unet_B8_SRx2_P64_scratch_20260308_124303_253954/models/net_g_305000.pth #~
  strict_load_g: true
  resume_state: ~
#  ignore_resume_networks: false

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [250000, 400000, 450000, 475000]
    gamma: 0.5

  total_iter: 500000
  warmup_iter: 1000  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3
  save_img: true
  pbar: true
  sample_step: 5

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 2
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 2
      test_y_channel: true
    lpips:
      type: calculate_lpips
      model: 'alex'
#    fid:
#      type: calculate_fid
#      crop_border: 2
#    niqe:
#      type: calculate_niqe
#      crop_border: 2


# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
