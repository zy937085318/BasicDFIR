# general settings
# TC-ATD: Timestep-Conditioned Adaptive Token Dictionary for Flow Matching SR
# Uses JiTModel with x_1 prediction, upscale=1 (flow matching mode)
name: MPv2_JiT_ATD_SRx4_P64_scratch
model_type: JiTModel
scale: 4
num_gpu: 1
manual_seed: 0
description: 'TC-ATD: Timestep-Conditioned Adaptive Token Dictionary for Flow Matching SR'

# dataset and data loader settings
datasets:
  train:
    task: SR
    name: DF2K
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/DF2K/train_HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/DF2K/train_LR_bicubic/X4
    filename_tmpl: '{}'
    io_backend:
      type: disk

    gt_size: 256
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 6
    batch_size_per_gpu: 4
    dataset_enlarge_ratio: 1
    prefetch_mode: cuda
    pin_memory: True
    persistent_workers: True

  val_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_4/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Set5/image_SRF_4/LR
    filename_tmpl: '{}'
    io_backend:
      type: disk

  val_2:
    name: Set14
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Set14/image_SRF_4/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Set14/image_SRF_4/LR
    filename_tmpl: '{}'
    io_backend:
      type: disk

  val_3:
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: /8T1/dataset/SRDataset/ImageSR/test/Urban100/image_SRF_4/HR
    dataroot_lq: /8T1/dataset/SRDataset/ImageSR/test/Urban100/image_SRF_4/LR
    filename_tmpl: '{}'
    io_backend:
      type: disk

# network structures
network_g:
  type: MPv2_arch
  upscale: 1            # Flow matching mode (LR bicubic-upsampled to HR before entering network)
  in_chans: 3           # Per-branch channels (x_t=3, lq=3, total=6)
  out_chans: 3
  img_size: 256         # HR patch size (LR bicubic-upsampled to this before entering network)
  embed_dim: 90
  depths: [6, 6, 6, 6]
  num_heads: [6, 6, 6, 6]
  window_size: 8
  dim_ffn_td: 16
  category_size: 128
  num_tokens: 64
  reducted_dim: 4
  convffn_kernel_size: 5
  img_range: 1.
  mlp_ratio: 2
  upsampler: ''         # No pixelshuffle — direct conv output for flow matching
  resi_connection: '1conv'
  use_checkpoint: false
  # TC-ATD specific
  temb_ch: 256          # Timestep embedding channels (>0 enables TC-ATD)
  embedding_dim: 256    # Sinusoidal embedding dimension
  downscale: 4          # PixelUnshuffle factor for JiT branch (256→64, 4x spatial reduction)

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  use_fp16: true
  ema_decay: 0.999
  optim_g:
    type: AdamW
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.9]

  scheduler:
    type: MultiStepLR
    milestones: [250000, 400000, 450000, 475000]
    gamma: 0.5

  total_iter: 500000
  warmup_iter: -1

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3
  save_img: true
  pbar: true
  sample_step: 5

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
